services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: smartcourier-rabbitmq-safe
    restart: unless-stopped
    hostname: smartcourier-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    mem_limit: 256m
    cpus: 0.50

volumes:
  rabbitmq_data:
